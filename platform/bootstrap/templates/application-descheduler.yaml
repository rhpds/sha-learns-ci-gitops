{{ if .Values.descheduler.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: descheduler
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ .Values.descheduler.git.repoURL }}
    targetRevision: {{ .Values.descheduler.git.targetRevision }}
    path: {{ .Values.descheduler.git.path }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: "operator.openshift.io"
      kind: "KubeDescheduler"
      jsonPointers:
        - /spec/mode
        - /spec/deschedulingIntervalSeconds
{{- end }}
