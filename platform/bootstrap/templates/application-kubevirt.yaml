{{ if .Values.kubevirt.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubevirt
  namespace: openshift-gitops
spec:
  project: platform
  source:
    repoURL: {{ .Values.kubevirt.git.repoURL }}
    targetRevision: {{ .Values.kubevirt.git.targetRevision }}
    path: {{ .Values.kubevirt.git.path }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: "hco.kubevirt.io"
    kind: "HyperConverged"
    jsonPointers:
    - /spec/enableCommonBootImageImport
{{- end }}
