# Default values for platform bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# defaults
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/ci-template-gitops.git
  targetRevision: main

deployer:
  domain: cluster.example.com

rhoai:
  enabled: false
  git:
    path: platform/rhoai
    <<: *git_defaults

kubevirt:
  enabled: false
  git:
    path: platform/kubevirt
    <<: *git_defaults

descheduler:
  enabled: false
  git:
    path: platform/descheduler
    <<: *git_defaults

mtc:
  enabled: false
  git:
    path: platform/mtc
    <<: *git_defaults

mtv:
  enabled: false
  git:
    path: platform/mtv
    <<: *git_defaults

odf:
  enabled: false
  git:
    path: platform/odf
    <<: *git_defaults

nodeHealthCheck:
  enabled: false
  git:
    path: platform/node-health-check
    <<: *git_defaults

webterminal:
  enabled: false
  git:
    path: platform/webterminal
    <<: *git_defaults

gitlab:
  enabled: false

OAuthAccountOperator:
  enabled: false
  authn: htpasswd
  git:
    path: helm
    <<: *git_defaults
  # HTPasswd config
  config:
    type: HTPasswd
    htpasswd:
      htpasswdSecret:
        name: htpasswd
