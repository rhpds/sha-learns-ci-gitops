{{ if .Values.platform.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-platform
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ .Values.platform.git.repoURL }}
    targetRevision: {{ .Values.platform.git.targetRevision }}
    path: platform/bootstrap
    helm:
      values: |
        deployer:
        {{- .Values.deployer | toYaml | nindent 10 }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10         # Max number of retry attempts
      backoff:
        duration: 5s    # Initial wait time
        factor: 2       # Multiply wait time by this factor each fail (5s, 10s, 20s...)
        maxDuration: 3m # Cap the wait time at 3 minutes
{{- end }}
