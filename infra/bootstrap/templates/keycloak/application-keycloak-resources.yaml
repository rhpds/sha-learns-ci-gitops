{{ if .Values.keycloakResources.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-resources
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ .Values.keycloakResources.git.repoURL }}
    targetRevision: {{ .Values.keycloakResources.git.targetRevision }}
    path: {{ .Values.keycloakResources.git.path }}
    helm:
      values: |
        deployer:
        {{- .Values.deployer | toYaml | nindent 10 }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
