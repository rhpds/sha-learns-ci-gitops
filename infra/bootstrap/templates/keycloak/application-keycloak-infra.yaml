{{ if .Values.keycloakInfra.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-infra
  namespace: openshift-gitops
spec:
  project: infra
  source:
    repoURL: {{ .Values.keycloakInfra.git.repoURL }}
    targetRevision: {{ .Values.keycloakInfra.git.targetRevision }}
    path: {{ .Values.keycloakInfra.git.path }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
