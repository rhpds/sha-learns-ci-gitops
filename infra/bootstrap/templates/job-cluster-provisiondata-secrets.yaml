{{- if .Values.keycloakResources.enabled -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-cluster-provisiondata-secrets
  namespace: openshift-gitops
  labels:
    demo.redhat.com/infra: "true"
  annotations:
    argocd.argoproj.io/sync-options: "Prune=true"
data:
  provision_data: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-provisiondata-secrets
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-provisiondata-secrets-read
  namespace: keycloak
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["hub-credentials"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-provisiondata-secrets-read
  namespace: keycloak
subjects:
  - kind: ServiceAccount
    name: cluster-provisiondata-secrets
    namespace: openshift-gitops
roleRef:
  kind: Role
  name: cluster-provisiondata-secrets-read
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-provisiondata-secrets-write
  namespace: openshift-gitops
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["infra-cluster-provisiondata-secrets"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-provisiondata-secrets-write
  namespace: openshift-gitops
subjects:
  - kind: ServiceAccount
    name: cluster-provisiondata-secrets
    namespace: openshift-gitops
roleRef:
  kind: Role
  name: cluster-provisiondata-secrets-write
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cluster-provisiondata-secrets
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 30
  template:
    spec:
      serviceAccountName: cluster-provisiondata-secrets
      restartPolicy: OnFailure
      containers:
        - name: provision
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "Waiting for hub-credentials secret..."
              until kubectl get secret hub-credentials -n keycloak &>/dev/null; do
                echo "  secret not found, retrying in 10s..."
                sleep 10
              done

              SSOADMIN_PASSWORD=$(kubectl get secret hub-credentials -n keycloak \
                -o jsonpath='{.data.ssoadmin-password}' | base64 -d)

              kubectl patch configmap infra-cluster-provisiondata-secrets \
                -n openshift-gitops \
                --type merge \
                -p "{\"data\":{\"provision_data\":\"ssoadmin_password: ${SSOADMIN_PASSWORD}\n\"}}"

              echo "ConfigMap infra-cluster-provisiondata-secrets updated."
{{- end }}
