apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
  name: pgsql-secret-generator
  namespace: keycloak
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
  name: pgsql-secret-generator
  namespace: keycloak
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
  name: pgsql-secret-generator
  namespace: keycloak
subjects:
  - kind: ServiceAccount
    name: pgsql-secret-generator
    namespace: keycloak
roleRef:
  kind: Role
  name: pgsql-secret-generator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
    # argocd.argoproj.io/hook: Sync
    # argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  name: pgsql-secret-generator
  namespace: keycloak
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: pgsql-secret-generator
      restartPolicy: Never
      containers:
        - name: secret-generator
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              SECRET_NAME="{{ .Values.database.secretName }}"

              if oc get secret "$SECRET_NAME" -n "keycloak" >/dev/null 2>&1; then
                echo "Secret $SECRET_NAME already exists, skipping."
                exit 0
              fi

              PASSWORD=$(head -c 24 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 24)

              kubectl create secret generic "$SECRET_NAME" \
                -n "keycloak" \
                --from-literal=dbname={{ .Values.database.name }} \
                --from-literal=host=keycloak-pgsql.keycloak.svc \
                --from-literal=port="5432" \
                --from-literal=username={{ .Values.database.username }} \
                --from-literal=password="$PASSWORD"

              echo "Secret $SECRET_NAME created."
