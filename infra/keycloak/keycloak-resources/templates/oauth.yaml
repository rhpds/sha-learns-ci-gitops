{{- if .Values.oauth.enabled }}
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  identityProviders:
    - name: keycloak
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: {{ .Values.oauth.clientId }}
        clientSecret:
          name: keycloak-oauth-client-secret
        issuer: https://sso.{{ .Values.deployer.domain }}/realms/{{ .Values.hub.realm.name }}
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email
        extraScopes:
          - email
          - profile
{{- end }}
