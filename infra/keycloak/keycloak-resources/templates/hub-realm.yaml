apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: {{ .Values.hub.realm.name }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
spec:
  keycloakCRName: keycloak
  realm:
    realm: {{ .Values.hub.realm.name }}
    displayName: {{ .Values.hub.realm.displayName | default .Values.hub.realm.name }}
    enabled: true
    sslRequired: external
    loginWithEmailAllowed: false
    identityProviders: []
