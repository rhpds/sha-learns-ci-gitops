# Provisions tenant users in a Keycloak realm via the Admin API.
#
# Runs as a one-shot Job (sync-wave -8, after the realm import at -9).
# Waits for the tenant realm to be ready before proceeding, since the
# KeycloakRealmImport is processed asynchronously by the Keycloak Operator.
#
# Users are NOT defined in the KeycloakRealmImport CR because realm imports
# are not idempotent for users — they only create users on initial import
# and skip them on subsequent applies. This Job uses the Admin API instead.
#
# Idempotent — safe to re-run. All operations check-then-create/update:
#   - Generates a random password per user on first run, stores all passwords
#     in the tenant-<realm>-credentials Secret; preserves existing passwords
#   - Creates or updates each user and sets their password
#
# ── User list construction ──────────────────────────────────────────────
#
# The user list is built from two additive sources (both can be used together):
#
#   1. prefix + count  →  .Values.user.prefix + .Values.user.count
#      e.g. prefix=user, count=3  produces:  user1, user2, user3
#
#   2. named users     →  .Values.user.names
#      Accepts either a YAML list [alice, bob] or a comma-separated
#      string "alice,bob" (for --set compatibility from the deployer).
#
# Combined example:
#   count=2, prefix=user, names=[alice,bob]  →  user1, user2, alice, bob
#
# If both count=0 and names is empty, no Job is rendered.
#
# ── Job naming and immutability ─────────────────────────────────────────
#
# Kubernetes Jobs have immutable spec.template fields. If the user list
# changes, ArgoCD cannot patch the existing Job — it would fail with
# "field is immutable". To handle this:
#
#   - The Job name includes a hash of the user list:
#       user-provisioner-<realm>-<hash>
#     When users change, the hash changes, creating a new Job.
#
#   - The hook annotation "BeforeHookCreation" deletes the previous Job
#     before creating the new one, preventing conflicts.
#
# ── Values consumed ─────────────────────────────────────────────────────
#
#   .Values.tenant.name   — tenant name (used as realm name fallback)
#   .Values.realm.name    — explicit realm name (overrides tenant name)
#   .Values.user.count    — number of prefix-numbered users (default 0)
#   .Values.user.prefix   — prefix for numbered users (default "user")
#   .Values.user.names    — explicit username list (YAML list or CSV string)
#
# ── Outputs ─────────────────────────────────────────────────────────────
#
#   Secret:    tenant-<realm>-credentials   — password per user (key = username prefix)
#   ConfigMap: tenant-<realm>-userdata-keycloak      — YAML account list in openshift-gitops
#              labeled demo.redhat.com/tenant-<realm>=true
#

# ── Template logic: build the realm name and user list ──────────────────

# Realm name: use explicit realm.name if set, otherwise fall back to tenant name
{{- $realmName := .Values.realm.name | default .Values.tenant.name | lower -}}

# Start with an empty user list
{{- $userNames := list -}}

# Step 1: Add prefix+count users (e.g. user1, user2, user3)
{{- if gt (int (.Values.user.count | default 0)) 0 -}}
  {{- range $i := until (int .Values.user.count) -}}
    {{- $userNames = append $userNames (printf "%s%d" $.Values.user.prefix (add $i 1)) -}}
  {{- end -}}
{{- end -}}

# Step 2: Append explicitly named users (additive, not replacing step 1)
{{- if .Values.user.names -}}
  {{- if kindIs "slice" .Values.user.names -}}
    # names is a YAML list — append each entry directly
    {{- range $name := .Values.user.names -}}
      {{- $userNames = append $userNames $name -}}
    {{- end -}}
  {{- else if kindIs "string" .Values.user.names -}}
    # names is a comma-separated string (from deployer --set) — split and append
    {{- range $name := splitList "," .Values.user.names -}}
      {{- $userNames = append $userNames $name -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

# Hash the final user list to detect changes (used in Job name)
{{- $userHash := $userNames | toJson | sha256sum | trunc 8 -}}

# Only render the Job and RBAC if there are users to provision
{{- if $userNames }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-provisioner-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
---
# RBAC: read keycloak-initial-admin, read/write tenant credentials secret and userdata configmap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-provisioner-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
rules:
  # Read the Keycloak admin credentials
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-initial-admin"]
    verbs: ["get"]
  # Read/update the tenant credentials secret (created by this Job)
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tenant-{{ $realmName }}-credentials"]
    verbs: ["get", "update", "patch"]
  # Create the credentials secret on first run
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-provisioner-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
subjects:
  - kind: ServiceAccount
    name: user-provisioner-{{ $realmName }}
    namespace: keycloak
roleRef:
  kind: Role
  name: user-provisioner-{{ $realmName }}
  apiGroup: rbac.authorization.k8s.io
---
# RBAC: create/update tenant userdata ConfigMap in openshift-gitops namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-provisioner-{{ $realmName }}
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["tenant-{{ $realmName }}-userdata-keycloak"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: user-provisioner-{{ $realmName }}
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
subjects:
  - kind: ServiceAccount
    name: user-provisioner-{{ $realmName }}
    namespace: keycloak
roleRef:
  kind: Role
  name: user-provisioner-{{ $realmName }}
  apiGroup: rbac.authorization.k8s.io
---
# Job name includes a hash of the user list so that changing the user list
# creates a new Job (avoids immutable spec.template errors).
# BeforeHookCreation deletes the old Job before creating the replacement.
apiVersion: batch/v1
kind: Job
metadata:
  name: user-provisioner-{{ $realmName }}-{{ $userHash }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 30
  template:
    spec:
      serviceAccountName: user-provisioner-{{ $realmName }}
      restartPolicy: OnFailure
      containers:
        - name: provision
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: KEYCLOAK_URL
              value: "https://keycloak.keycloak.svc:8443"
            - name: REALM
              value: {{ $realmName | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              CREDENTIALS_SECRET="tenant-${REALM}-credentials"

              # ── Step 1: Get Keycloak admin credentials from the operator-managed secret ──
              ADMIN_USER=$(kubectl get secret keycloak-initial-admin -n keycloak -o jsonpath='{.data.username}' | base64 -d)
              ADMIN_PASS=$(kubectl get secret keycloak-initial-admin -n keycloak -o jsonpath='{.data.password}' | base64 -d)

              # ── Step 2: Obtain an admin API token (retries until Keycloak is ready) ──
              for i in $(seq 1 30); do
                TOKEN=$(curl -sk -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                  -d "grant_type=password" \
                  -d "client_id=admin-cli" \
                  -d "username=${ADMIN_USER}" \
                  -d "password=${ADMIN_PASS}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null) && [ -n "${TOKEN}" ] && break
                echo "Waiting for Keycloak... (attempt ${i})"
                sleep 10
              done

              if [ -z "${TOKEN}" ]; then
                echo "ERROR: Could not obtain admin token"
                exit 1
              fi

              API="${KEYCLOAK_URL}/admin/realms/${REALM}"

              # ── Step 3: Wait for the realm to exist ──
              # The KeycloakRealmImport CR (sync-wave -9) is processed asynchronously
              # by the Keycloak Operator, so the realm may not exist yet.
              for i in $(seq 1 30); do
                REALM_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer ${TOKEN}" "${API}")
                [ "${REALM_STATUS}" = "200" ] && break
                echo "Waiting for realm ${REALM}... (attempt ${i}, status ${REALM_STATUS})"
                sleep 10
              done

              if [ "${REALM_STATUS}" != "200" ]; then
                echo "ERROR: Realm ${REALM} not available after 30 attempts"
                exit 1
              fi
              echo "Realm ${REALM} is ready."

              # ── Step 4: Load existing credentials (if any) ──
              # On re-runs, we preserve previously generated passwords so that
              # users don't get locked out by password changes.
              declare -A PASSWORDS
              if kubectl get secret "${CREDENTIALS_SECRET}" -n keycloak &>/dev/null; then
                echo "Loading existing credentials..."
              fi

              # ── provision_user function ──
              # Creates or updates a single user in the realm via the Admin API.
              #
              # Arguments:
              #   $1 FULL_USERNAME — Keycloak username (e.g. "user1@myrealm")
              #   $2 EMAIL         — email address for the user
              #   $3 FIRST_NAME    — display first name
              #   $4 SECRET_KEY    — key in the credentials Secret (e.g. "user1")
              #
              # Behavior:
              #   - Checks the credentials Secret for an existing password; if found,
              #     reuses it. Otherwise generates a random 16-char password.
              #   - Creates the user if it doesn't exist (201), or skips (409 conflict).
              #   - Sets/resets the password (idempotent — always writes desired value).
              #   - Stores the password in the PASSWORDS associative array for later
              #     Secret/ConfigMap writing.
              provision_user() {
                local FULL_USERNAME="$1"
                local EMAIL="$2"
                local FIRST_NAME="$3"
                local SECRET_KEY="$4"

                # Check for existing password in the credentials secret
                local EXISTING_PW=""
                EXISTING_PW=$(kubectl get secret "${CREDENTIALS_SECRET}" -n keycloak -o jsonpath="{.data.${SECRET_KEY}}" 2>/dev/null | base64 -d 2>/dev/null || true)

                if [ -n "${EXISTING_PW}" ]; then
                  local PW="${EXISTING_PW}"
                else
                  local PW=$(head -c 32 /dev/urandom | base64 | tr -d '/+=' | head -c 16)
                fi
                PASSWORDS["${SECRET_KEY}"]="${PW}"

                # Check if user already exists in the realm
                local USER_ID
                USER_ID=$(curl -sk -H "Authorization: Bearer ${TOKEN}" \
                  "${API}/users?username=${FULL_USERNAME}&exact=true" | \
                  python3 -c "import sys,json; users=json.load(sys.stdin); print(users[0]['id'] if users else '')" 2>/dev/null || true)

                if [ -n "${USER_ID}" ]; then
                  echo "User ${FULL_USERNAME} exists (${USER_ID}), updating password..."
                else
                  echo "Creating user ${FULL_USERNAME}..."
                  local HTTP_CODE
                  HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST "${API}/users" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "username": "'"${FULL_USERNAME}"'",
                      "email": "'"${EMAIL}"'",
                      "emailVerified": true,
                      "enabled": true,
                      "firstName": "'"${FIRST_NAME}"'",
                      "lastName": "{{ $realmName }}"
                    }')
                  if [ "${HTTP_CODE}" = "201" ]; then
                    echo "User ${FULL_USERNAME} created."
                  elif [ "${HTTP_CODE}" = "409" ]; then
                    echo "User ${FULL_USERNAME} already exists (409 conflict)."
                  else
                    echo "ERROR: Failed to create user ${FULL_USERNAME}: ${HTTP_CODE}"
                    return 1
                  fi

                  # Fetch the user ID after creation (needed for password reset)
                  USER_ID=$(curl -sk -H "Authorization: Bearer ${TOKEN}" \
                    "${API}/users?username=${FULL_USERNAME}&exact=true" | \
                    python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
                  echo "User ID: ${USER_ID}"
                fi

                # Set password (idempotent — always sets to desired value)
                local PW_CODE
                PW_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X PUT "${API}/users/${USER_ID}/reset-password" \
                  -H "Authorization: Bearer ${TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "type": "password",
                    "value": "'"${PW}"'",
                    "temporary": false
                  }')
                if [ "${PW_CODE}" = "204" ] || [ "${PW_CODE}" = "200" ]; then
                  echo "User ${FULL_USERNAME} password set."
                else
                  echo "ERROR: Failed to set password for ${FULL_USERNAME}: ${PW_CODE}"
                  return 1
                fi
                echo "User ${FULL_USERNAME} provisioned."
              }

              # ── Step 5: Provision each user ──
              # Each call: provision_user "username@realm" "email" "FirstName" "secret-key"
              # The secret-key is the bare username (without @realm) used as the key
              # in the credentials Secret.
              {{- range $username := $userNames }}
              provision_user "{{ $username }}@{{ $realmName }}" "{{ $username }}@{{ $realmName }}.example.com" "{{ $username | title }}" "{{ $username }}"
              {{- end }}

              # ── Step 6: Write all passwords to the credentials Secret ──
              # This Secret is the source of truth for user passwords.
              # Format: key = bare username (e.g. "user1"), value = password string.
              kubectl apply -f - <<EOSECRET
              apiVersion: v1
              kind: Secret
              metadata:
                name: ${CREDENTIALS_SECRET}
                namespace: keycloak
              type: Opaque
              stringData:
              $(for key in "${!PASSWORDS[@]}"; do
                echo "  ${key}: \"${PASSWORDS[$key]}\""
              done)
              EOSECRET

              # ── Step 7: Write tenant userdata ConfigMap to openshift-gitops ──
              # The deployer reads ConfigMaps labeled demo.redhat.com/tenant-<GUID>=true.
              # Format: provision_data.users.<key>.username
              PROVISION_YAML="users:"
              for key in "${!PASSWORDS[@]}"; do
                PROVISION_YAML="${PROVISION_YAML}"$'\n'"  ${key}:"$'\n'"    username: ${key}@${REALM}"
              done

              kubectl apply -f - <<EOCM2
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: tenant-${REALM}-userdata-keycloak
                namespace: openshift-gitops
                labels:
                  demo.redhat.com/tenant-${REALM}: "true"
              data:
                provision_data: |
              $(echo "${PROVISION_YAML}" | sed 's/^/    /')
              EOCM2
              echo "Tenant userdata ConfigMap written to openshift-gitops."

              echo "All users provisioned. Credentials stored in secret ${CREDENTIALS_SECRET} in namespace keycloak."
{{- end }}
