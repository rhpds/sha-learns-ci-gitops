# Registers a tenant's spoke realm as an Identity Provider (IdP) in the hub realm.
#
# Runs as a CronJob every 2 minutes to ensure the IdP stays configured.
# Creates or updates the OIDC IdP broker (idp-<realm>) so that hub realm
# users can authenticate via the spoke realm.
#
# Idempotent — safe to re-run. Checks if the IdP exists before creating,
# and updates in place if already present. Handles 409 conflicts gracefully.
#
# Also creates a sentinel ConfigMap (idp-registration-<realm>) used by the
# idp-and-realm-cleanup CronJob to detect orphaned tenants.
{{- $realmName := .Values.realm.name | default .Values.tenant.name | lower -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: idp-registrar-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: idp-registrar-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["keycloak-initial-admin"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: idp-registrar-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
subjects:
  - kind: ServiceAccount
    name: idp-registrar-{{ $realmName }}
    namespace: keycloak
roleRef:
  kind: Role
  name: idp-registrar-{{ $realmName }}
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: idp-registrar-{{ $realmName }}
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-7"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 0
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: idp-registrar-{{ $realmName }}
          restartPolicy: Never
          containers:
            - name: register-idp
              image: registry.redhat.io/openshift4/ose-cli:latest
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  KEYCLOAK_URL="https://keycloak.keycloak.svc:8443"
                  KEYCLOAK_EXTERNAL_URL="https://sso.{{ .Values.deployer.domain }}"
                  HUB_REALM="{{ .Values.hub.realmName }}"
                  SPOKE_REALM="{{ $realmName }}"
                  IDP_ALIAS="idp-${SPOKE_REALM}"

                  # Get admin credentials from secret
                  ADMIN_USER=$(kubectl get secret keycloak-initial-admin -n keycloak -o jsonpath='{.data.username}' | base64 -d)
                  ADMIN_PASS=$(kubectl get secret keycloak-initial-admin -n keycloak -o jsonpath='{.data.password}' | base64 -d)

                  # Get admin token (retry until Keycloak is ready)
                  TOKEN=""
                  for i in $(seq 1 10); do
                    TOKEN=$(curl -sk -X POST "${KEYCLOAK_URL}/realms/master/protocol/openid-connect/token" \
                      -d "grant_type=password" \
                      -d "client_id=admin-cli" \
                      -d "username=${ADMIN_USER}" \
                      -d "password=${ADMIN_PASS}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null) && [ -n "${TOKEN}" ] && break
                    echo "Waiting for Keycloak... (attempt ${i})"
                    sleep 10
                  done

                  if [ -z "${TOKEN}" ]; then
                    echo "ERROR: Could not obtain admin token"
                    exit 1
                  fi

                  API="${KEYCLOAK_URL}/admin/realms/${HUB_REALM}"

                  # Check if IdP exists
                  IDP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
                    -H "Authorization: Bearer ${TOKEN}" \
                    "${API}/identity-provider/instances/${IDP_ALIAS}")

                  # Home IdP Discovery via Keycloak 26 Organizations:
                  # When a user types "username@<realm>" at the hub login page,
                  # Keycloak matches the @-domain against organization domains.
                  # The kc.org.domain config links this IdP to that domain, and
                  # kc.org.broker.redirect.mode.email-matches enables auto-redirect
                  # so the user is sent directly to the spoke realm login page.
                  #
                  # Example: user types "moe@5fvrv" → Keycloak sees domain "5fvrv"
                  #   → matches org-5fvrv → auto-redirects to idp-5fvrv.
                  IDP_PAYLOAD='{
                    "alias": "'${IDP_ALIAS}'",
                    "displayName": "Spoke: '${SPOKE_REALM}'",
                    "providerId": "oidc",
                    "enabled": true,
                    "trustEmail": true,
                    "firstBrokerLoginFlowAlias": "first broker login",
                    "config": {
                      "authorizationUrl": "'${KEYCLOAK_EXTERNAL_URL}'/realms/'${SPOKE_REALM}'/protocol/openid-connect/auth",
                      "tokenUrl": "'${KEYCLOAK_EXTERNAL_URL}'/realms/'${SPOKE_REALM}'/protocol/openid-connect/token",
                      "userInfoUrl": "'${KEYCLOAK_EXTERNAL_URL}'/realms/'${SPOKE_REALM}'/protocol/openid-connect/userinfo",
                      "jwksUrl": "'${KEYCLOAK_EXTERNAL_URL}'/realms/'${SPOKE_REALM}'/protocol/openid-connect/certs",
                      "issuer": "'${KEYCLOAK_EXTERNAL_URL}'/realms/'${SPOKE_REALM}'",
                      "clientId": "hub-federation",
                      "clientSecret": "hub-federation-secret",
                      "clientAuthMethod": "client_secret_post",
                      "syncMode": "FORCE",
                      "useJwksUrl": "true",
                      "loginHint": "true",
                      "kc.org.domain": "'${SPOKE_REALM}'",
                      "kc.org.broker.redirect.mode.email-matches": "true"
                    }
                  }'

                  if [ "${IDP_STATUS}" = "200" ]; then
                    echo "IdP ${IDP_ALIAS} exists, updating..."
                    HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X PUT "${API}/identity-provider/instances/${IDP_ALIAS}" \
                      -H "Authorization: Bearer ${TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "${IDP_PAYLOAD}")
                    echo "IdP update response: ${HTTP_CODE}"
                  else
                    echo "Creating IdP ${IDP_ALIAS}..."
                    HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST "${API}/identity-provider/instances" \
                      -H "Authorization: Bearer ${TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d "${IDP_PAYLOAD}")
                    if [ "${HTTP_CODE}" = "201" ]; then
                      echo "IdP ${IDP_ALIAS} created."
                    elif [ "${HTTP_CODE}" = "409" ]; then
                      echo "IdP ${IDP_ALIAS} already exists (409 conflict), skipping create."
                    else
                      echo "ERROR: Failed to create IdP ${IDP_ALIAS}: ${HTTP_CODE}"
                      exit 1
                    fi
                  fi

                  #
                  # --- Organization + Domain for Home IdP Discovery ---
                  #
                  # Create a Keycloak Organization for this tenant and link the IdP.
                  # The organization's domain (set to the realm name) enables Home IdP
                  # Discovery: when a user types "user@<realm>" at the hub login,
                  # Keycloak matches the domain to this org and redirects to its IdP.
                  #

                  ORG_NAME="org-${SPOKE_REALM}"

                  # Check if org exists
                  ORG_ID=$(curl -sk -H "Authorization: Bearer ${TOKEN}" \
                    "${API}/organizations?search=${ORG_NAME}&exact=true" | \
                    python3 -c "import sys,json; orgs=json.load(sys.stdin); print(orgs[0]['id'] if orgs else '')" 2>/dev/null || true)

                  if [ -z "${ORG_ID}" ]; then
                    echo "Creating organization ${ORG_NAME}..."
                    HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST "${API}/organizations" \
                      -H "Authorization: Bearer ${TOKEN}" \
                      -H "Content-Type: application/json" \
                      -d '{
                        "name": "'"${ORG_NAME}"'",
                        "enabled": true,
                        "domains": [{"name": "'"${SPOKE_REALM}"'", "verified": true}]
                      }')
                    echo "Organization create response: ${HTTP_CODE}"

                    # Fetch the org ID after creation
                    ORG_ID=$(curl -sk -H "Authorization: Bearer ${TOKEN}" \
                      "${API}/organizations?search=${ORG_NAME}&exact=true" | \
                      python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])" 2>/dev/null || true)
                  else
                    echo "Organization ${ORG_NAME} exists (${ORG_ID})."
                  fi

                  if [ -n "${ORG_ID}" ]; then
                    # Link the IdP to the organization
                    LINK_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
                      -H "Authorization: Bearer ${TOKEN}" \
                      "${API}/organizations/${ORG_ID}/identity-providers/${IDP_ALIAS}")

                    if [ "${LINK_STATUS}" != "200" ]; then
                      echo "Linking IdP ${IDP_ALIAS} to organization ${ORG_NAME}..."
                      HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST \
                        "${API}/organizations/${ORG_ID}/identity-providers" \
                        -H "Authorization: Bearer ${TOKEN}" \
                        -H "Content-Type: application/json" \
                        -d '"'"${IDP_ALIAS}"'"')
                      echo "IdP link response: ${HTTP_CODE}"
                    else
                      echo "IdP ${IDP_ALIAS} already linked to org ${ORG_NAME}."
                    fi
                  fi

                  echo "IdP registration complete for spoke ${SPOKE_REALM}."
