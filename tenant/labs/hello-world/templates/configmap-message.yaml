apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-message
  labels:
    app: hello-world
    tenant: {{ .Values.tenant.name }}
data:
  # METHOD 2: ConfigMap as file
  # Access: oc exec <pod> -- cat /config/message.txt
  message.txt: |
    ========================================
    METHOD 2: ConfigMap Mounted as File
    ========================================

    Message: {{ .Values.message }}
    Tenant: {{ .Values.tenant.name }}
    Replicas: {{ .Values.replicas }}
    Image Tag: {{ .Values.imageTag }}

    This file is mounted at /config/message.txt

    To read this:
    oc exec <pod-name> -- cat /config/message.txt
