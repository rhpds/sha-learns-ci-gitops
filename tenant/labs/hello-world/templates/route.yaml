apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: hello-world
  labels:
    app: hello-world
    tenant: {{ .Values.tenant.name }}
spec:
  host: hello-world-{{ .Values.tenant.name }}.{{ .Values.deployer.domain }}
  to:
    kind: Service
    name: hello-world
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
