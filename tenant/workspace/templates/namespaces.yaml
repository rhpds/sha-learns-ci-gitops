{{/* namespace names must be sanitized */}}
{{- $nsName := .Values.username | replace "@" "-" | lower -}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: wksp-{{ $nsName }}
  annotations:
    openshift.io/description: "Workspace Namespace"
    openshift.io/display-name: "Workspace"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wksp-edit-{{ $nsName }}
  namespace: wksp-{{ $nsName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: {{ .Values.username }}
