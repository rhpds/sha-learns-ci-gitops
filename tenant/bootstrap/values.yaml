# Default values for bootstrap.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# These defaults are for OpenShift 4.21

# defaults
default_settings: &git_defaults
  repoURL: https://github.com/rhpds/sha-learns-ci-gitops.git
  targetRevision: main

deployer:
  domain: apps.cluster-aaaa-yourdomain.com
  apiUrl: https://api.cluster-aaaa.yourdomain.com:6443

tenant:
  name: GUID
  user:
    name: agv-generated-username@GUID
    password: generated_password
    keycloakEnabled: false

# not needed for this example but keeping for reference and not breaking the example
namespace:
  namePrefix: vms

# create an app in a namespace
# who doesn't need a loadtester?
# not needed for this example but keeping for reference and not breaking the example
loadtest:
  enabled: false
  requestsPerSecond: 0 #off
  duration: 1000
  url: https://example.com/your/app

labs:
  rosetta:
    enabled: false
  helloWorld:         # ← ADD THIS
      enabled: false

keycloakRealm:
  enabled: false
