{{ if .Values.keycloakRealm.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-{{ .Values.tenant.name | lower }}-keycloak-realm
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants
  source:
    repoURL: {{ .Values.keycloakRealm.git.url }}
    targetRevision: {{ .Values.keycloakRealm.git.revision }}
    path: {{ .Values.keycloakRealm.git.path }}
    helm:
      values: |
        tenant:
        {{- .Values.tenant | toYaml | nindent 10 }}
        deployer:
        {{- .Values.deployer | toYaml | nindent 10 }}
        user:
        {{- .Values.tenant.user | toYaml | nindent 10 }}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
