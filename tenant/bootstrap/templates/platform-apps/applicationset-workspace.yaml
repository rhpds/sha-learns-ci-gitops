{{/* Creates workspaces for 1 or more users in the tenant */}}
{{ if .Values.tenant.user.keycloakEnabled -}}
{{ if .Values.workspace.enabled -}}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: tenant-{{ .Values.tenant.name | lower }}-workspace
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  generators:
  - list:
      elements:
{{- range $user := include "userList" . | fromJsonArray }}
      - user: {{ $user }}
{{- end }}
  template:
    metadata:
      name: tenant-{{ .Values.tenant.name | lower }}-workspace-{{- "{{" }} user {{- " }}" }}
      namespace: openshift-gitops
    spec:
      project: tenants
      source:
        repoURL: {{ .Values.workspace.git.repoURL }}
        targetRevision: {{ .Values.workspace.git.targetRevision }}
        path: {{ .Values.workspace.git.path }}
        helm:
          values: |
            username: '{{- "{{" }} user {{- " }}" }}@{{ .Values.tenant.name }}'
            tenant:
            {{- .Values.tenant | toYaml | nindent 14 }}
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: false
          selfHeal: false
{{- end }}
{{- end }}
