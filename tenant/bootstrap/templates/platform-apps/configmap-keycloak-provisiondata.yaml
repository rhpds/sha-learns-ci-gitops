{{- if .Values.keycloakRealm.enabled -}}
{{- $realmName := .Values.tenant.name | lower -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-{{ $realmName }}-userdata-keycloak
  namespace: openshift-gitops
  labels:
    demo.redhat.com/tenant-{{ $realmName }}: "true"
  annotations:
    argocd.argoproj.io/sync-options: "Prune=true"
data:
  provision_data: ""
{{- end }}
