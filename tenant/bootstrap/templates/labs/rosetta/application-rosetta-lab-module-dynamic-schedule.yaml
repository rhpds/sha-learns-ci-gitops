{{- $labRosetta := include "labRosetta" . | fromYaml -}}
{{ if and .Values.labs.rosetta.enabled $labRosetta.moduleDynamicSchedule.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rosetta-lab-module-dynamic-schedule
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants
  source:
    repoURL: {{ $labRosetta.moduleDynamicSchedule.git.url }}
    targetRevision: {{ $labRosetta.moduleDynamicSchedule.git.revision }}
    path: {{ $labRosetta.moduleDynamicSchedule.git.path }}
  destination:
    server: https://kubernetes.default.svc
    namespace: dynamic-schedule
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: "apps"
      kind: "Deployment"
      jsonPointers:
        - /spec/replicas
        - /spec/template/spec/nodeSelector
{{- end }}
