{{- $labRosetta := include "labRosetta" . | fromYaml -}}
{{ if and .Values.labs.rosetta.enabled $labRosetta.moduleLiveMigrate.enabled -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rosetta-lab-module-live-migrate
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: tenants
  source:
    repoURL: {{ $labRosetta.moduleLiveMigrate.git.url }}
    targetRevision: {{ $labRosetta.moduleLiveMigrate.git.revision }}
    path: {{ $labRosetta.moduleLiveMigrate.git.path }}
  destination:
    server: https://kubernetes.default.svc
    namespace: live-migrate
  syncPolicy:
    automated:
      enabled: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    managedNamespaceMetadata:
      labels:
        openshift.io/cluster-monitoring: "true"
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
{{- end }}
