{{/* namespace names must be sanitized */}}
{{- $nsUsername := .Values.tenant.user.name | replace "@" "-" | lower -}}
{{- $nsName := printf "%s-%s" .Values.namespace.namePrefix $nsUsername -}}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $nsName }}
  annotations:
    openshift.io/description: "Namespace for {{ .Values.tenant.user.name }}"
    openshift.io/display-name: "Namespace for {{ .Values.tenant.user.name }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $nsName }}-edit-{{ $nsUsername }}
  namespace: {{ $nsName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: User
  name: {{ .Values.tenant.user.name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tenant-{{ $.Values.tenant.name }}-namespace-provisiondata
  namespace: {{ $nsName }}
  labels:
    demo.redhat.com/tenant-{{ $.Values.tenant.name }}: "true"
  annotations:
    argocd.argoproj.io/sync-options: "Prune=true"
data:
  provision_data: |
    users:
      {{ .Values.tenant.user.name | lower }}:
        namespace: {{ $nsName }}
