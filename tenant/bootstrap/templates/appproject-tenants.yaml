---
# ArgoCD AppProject for tenant deployments
# This is a shared cluster resource used by all tenants.
# It will be created by the first tenant and reused by subsequent tenants.
# Helm will handle the idempotency - subsequent deployments will see it exists.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tenants
  namespace: openshift-gitops
  labels:
    managed-by: bootstrap-tenant
  annotations:
    # Prevent accidental deletion by ArgoCD
    argocd.argoproj.io/sync-options: "Prune=false"
spec:
  description: Shared project for tenant-specific deployments

  # Allow tenants to pull from any Git repository
  sourceRepos:
  - '*'

  # Allow tenants to deploy to any namespace
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc

  # Allow tenants to create any cluster-scoped resources
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'

  # Allow tenants to create any namespace-scoped resources
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
